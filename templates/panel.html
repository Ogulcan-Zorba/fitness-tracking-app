<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gücünü Yaz</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g transform='rotate(-30 50 50)'><rect x='25' y='44' width='50' height='12' fill='%23cccccc' rx='2'/><rect x='15' y='25' width='12' height='50' fill='%23e50914' rx='3'/><rect x='5' y='32' width='8' height='36' fill='%23b80710' rx='2'/><rect x='73' y='25' width='12' height='50' fill='%23e50914' rx='3'/><rect x='87' y='32' width='8' height='36' fill='%23b80710' rx='2'/></g></svg>">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        .ozel-select-kutusu { position: relative; width: 100%; margin-bottom: 25px; font-family: 'Poppins', sans-serif; }
        .ozel-select-tetikleyici { width: 100%; padding: 16px; padding-right: 60px; border: 2px solid #333; border-radius: 5px; background-color: rgba(0, 0, 0, 0.6); color: white; font-size: 1.1rem; cursor: pointer; box-sizing: border-box; transition: 0.3s; display: flex; align-items: center; }
        .ozel-select-tetikleyici:hover { border-color: #e50914; }
        .ozel-secenekler { position: absolute; top: 100%; left: 0; right: 0; background-color: rgba(15, 15, 15, 0.95); border: 2px solid #e50914; border-top: none; border-radius: 0 0 5px 5px; z-index: 10; display: none; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .ozel-secenekler.acik { display: block; }
        .ozel-secenek { padding: 15px 16px; color: #ccc; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #333; }
        .ozel-secenek:last-child { border-bottom: none; }
        .ozel-secenek:hover { background-color: rgba(229, 9, 20, 0.2); color: white; padding-left: 25px; }

        .hamburger-btn { font-size: 2.2rem; color: white; cursor: pointer; transition: 0.3s; margin-right: 20px; user-select: none; line-height: 1; display: flex; align-items: center;}
        .hamburger-btn:hover { color: #e50914; text-shadow: 0 0 10px rgba(229,9,20,0.5); }
        
        .yan-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background-color: #0d0d0d; border-right: 2px solid #e50914; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; box-shadow: 5px 0 25px rgba(0,0,0,0.9); display: flex; flex-direction: column; padding-top: 80px; }
        .yan-menu.acik { left: 0; }
        
        .yan-menu a { color: #ccc; text-decoration: none; font-size: 1.15rem; padding: 18px 30px; border-bottom: 1px solid #222; transition: 0.3s; font-weight: 500; display: flex; align-items: center; gap: 15px;}
        .yan-menu a:hover { background-color: rgba(229,9,20,0.15); color: white; padding-left: 40px; border-left: 4px solid #e50914; }
        
        .menu-arkaplan { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .menu-arkaplan.acik { opacity: 1; visibility: visible; }
        
        .kapat-btn { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; color: #666; cursor: pointer; line-height: 1; transition: 0.3s; }
        .kapat-btn:hover { color: #e50914; transform: rotate(90deg); }
    </style>
</head>
<body>

    <div class="menu-arkaplan" id="menuArkaplan"></div>

    <div class="yan-menu" id="yanMenu">
        <span class="kapat-btn" id="kapatBtn">&times;</span>
        
        <div style="padding: 0 30px 20px 30px; margin-bottom: 10px; border-bottom: 2px dashed #333;">
            <p style="color: #666; font-size: 0.9rem; margin: 0; text-transform: uppercase; font-weight: bold;">Menü</p>
        </div>

        <a href="/">🏠 Ana Sayfa</a>
        <a href="/gecmis">🕒 Geçmiş Antrenmanlarım</a>
        <a href="/rehber">📚 Hareket Rehberi</a>
        <a href="/profil">👤 Profilim</a>
        
        <div style="margin-top: auto; border-top: 1px solid #333;">
            <a href="/cikis" style="color: #e50914;">🚪 Güvenli Çıkış</a>
        </div>
    </div>

   <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: 15px 25px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.85); border-bottom: 2px solid #e50914; z-index: 100; backdrop-filter: blur(5px);">
        
        <div style="display: flex; align-items: center;">
            <div class="hamburger-btn" id="hamburgerBtn">&#9776;</div>
            
            <a href="/" style="display: flex; align-items: center; font-size: 1.8rem; font-weight: 800; color: white; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="45" height="45" style="margin-right: 12px;">
                    <g transform="rotate(-30 50 50)">
                        <rect x="25" y="44" width="50" height="12" fill="#cccccc" rx="2"/>
                        <rect x="15" y="25" width="12" height="50" fill="#e50914" rx="3"/>
                        <rect x="5" y="32" width="8" height="36" fill="#b80710" rx="2"/>
                        <rect x="73" y="25" width="12" height="50" fill="#e50914" rx="3"/>
                        <rect x="87" y="32" width="8" height="36" fill="#b80710" rx="2"/>
                    </g>
                </svg>
                GÜCÜNÜ <span style="color: #e50914; margin-left: 6px;">YAZ</span>
            </a>
        </div>

        <div>
            <a href="/cikis" style="color: #e50914; text-decoration: none; font-weight: bold; border: 1px solid #e50914; padding: 8px 16px; border-radius: 5px; transition: 0.3s; font-family: 'Poppins', sans-serif;" onmouseover="this.style.backgroundColor='#e50914'; this.style.color='white';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='#e50914';">Çıkış</a>
        </div>
    </nav>
    <div class="container" style="max-width: 700px; margin-top: 100px;">
        <h1>Hoş Geldin, <br><span>Sınırları Zorlama Vakti!</span></h1>
        
        <h2>Günün <span>Antrenmanını</span> Kaydet</h2>
        
        <form action="/antrenman_kaydet" method="POST">
            
            <label style="color: #ccc; font-weight: bold; display: block; text-align: left; margin-bottom: 5px;">📅 Antrenman Tarihi:</label>
            <input type="date" id="antrenmanTarihi" name="antrenman_tarihi" required style="width: 100%; padding: 12px; margin-bottom: 25px; border-radius: 5px; border: 2px solid #333; background-color: rgba(0, 0, 0, 0.6); color: white; font-family: 'Poppins', sans-serif; box-sizing: border-box; color-scheme: dark;">

            <label style="color: #ccc; font-weight: bold; display: block; text-align: left; margin-bottom: 5px;">1. Çalıştığın Bölgeyi Seç:</label>
            
            <div class="ozel-select-kutusu" id="akilliMenu">
                <div class="ozel-select-tetikleyici" id="menuTetikleyici" data-secili-resim="">
                    <span id="secilenMetin">Önce bir bölge seçin...</span>
                    <img id="kutuIciResim" src="" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 45px; height: 45px; border-radius: 5px; border: 1px solid #e50914; display: none; object-fit: cover; pointer-events: none;">
                </div>
                
                <div class="ozel-secenekler" id="menuSecenekleri">
                    <div class="ozel-secenek" data-value="Göğüs" data-img="{{ url_for('static', filename='images/chest.jpg') }}">Göğüs</div>
                    <div class="ozel-secenek" data-value="Sırt" data-img="{{ url_for('static', filename='images/back.jpg') }}">Sırt</div>
                    <div class="ozel-secenek" data-value="Omuz" data-img="{{ url_for('static', filename='images/shoulder.jpg') }}">Omuz</div>
                    <div class="ozel-secenek" data-value="Bacak" data-img="{{ url_for('static', filename='images/legs.jpg') }}">Bacak</div>
                    <div class="ozel-secenek" data-value="Ön Kol" data-img="{{ url_for('static', filename='images/biceps.jpg') }}">Ön Kol</div>
                    <div class="ozel-secenek" data-value="Arka Kol" data-img="{{ url_for('static', filename='images/triceps.jpg') }}">Arka Kol</div>
                    <div class="ozel-secenek" data-value="Bilek" data-img="{{ url_for('static', filename='images/forearm.jpg') }}">Bilek</div>
                    <div class="ozel-secenek" data-value="Karın" data-img="{{ url_for('static', filename='images/core.jpg') }}">Karın</div>
                </div>
            </div>

            <label style="color: #ccc; font-weight: bold; display: block; text-align: left;">2. Hareketi Seç:</label>
            <select name="hareket_id" id="hareketKutusu" required disabled style="background-color: rgba(255,255,255,0.1); cursor: not-allowed;">
                <option value="" disabled selected>Önce yukarıdan bir bölge seçin...</option>
                {% for h in hareketler %}
                    <option value="{{ h[0] }}" data-bolge="{{ h[2] }}">{{ h[1] }}</option>
                {% endfor %}
            </select>

            <label style="color: #ccc; font-weight: bold; display: block; text-align: left;">3. Kaç Set Yaptın?</label>
            <input type="number" id="setAdeti" name="toplam_set" placeholder="Örn: 3" min="1" max="10" required>

            <div id="setDetaylariAlani"></div>

            <br>
            <input type="submit" value="KAYDET VE GÜÇLEN" style="width: 100%;">
        </form>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const yanMenu = document.getElementById('yanMenu');
        const menuArkaplan = document.getElementById('menuArkaplan');
        const kapatBtn = document.getElementById('kapatBtn');

        function menuyuAc() {
            yanMenu.classList.add('acik');
            menuArkaplan.classList.add('acik');
        }

        function menuyuKapat() {
            yanMenu.classList.remove('acik');
            menuArkaplan.classList.remove('acik');
        }

        hamburgerBtn.addEventListener('click', menuyuAc);
        kapatBtn.addEventListener('click', menuyuKapat);
        menuArkaplan.addEventListener('click', menuyuKapat); 

        // TARIH OTOMATIK BUGUN OLSUN
        document.getElementById('antrenmanTarihi').valueAsDate = new Date();

        // --- YENİ: MOUSE TEKERLEĞİ İLE SAYI DEĞİŞMESİNİ ENGELLEYEN BEKÇİ ---
        document.addEventListener("wheel", function(event){
            // Eğer kullanıcının o an aktif olduğu (tıkladığı) yer bir "number" kutusuysa
            if(document.activeElement.type === "number"){
                // Kutudan çık (böylece sayfayı kaydırır ama sayıyı değiştirmez)
                document.activeElement.blur();
            }
        });
        // -------------------------------------------------------------------

        const tetikleyici = document.getElementById('menuTetikleyici');
        const seceneklerListesi = document.getElementById('menuSecenekleri');
        const secenekler = document.querySelectorAll('.ozel-secenek');
        const secilenMetin = document.getElementById('secilenMetin');
        const kutuIciResim = document.getElementById('kutuIciResim');
        
        const hareketKutusu = document.getElementById('hareketKutusu');
        const hareketSecenekleri = hareketKutusu.querySelectorAll('option');

        tetikleyici.addEventListener('click', function() {
            seceneklerListesi.classList.toggle('acik');
        });

        document.addEventListener('click', function(e) {
            if (!document.getElementById('akilliMenu').contains(e.target)) {
                seceneklerListesi.classList.remove('acik');
            }
        });

        secenekler.forEach(secenek => {
            secenek.addEventListener('mouseenter', function() {
                const resimYolu = this.getAttribute('data-img');
                if (resimYolu) {
                    kutuIciResim.src = resimYolu;
                    kutuIciResim.style.display = 'block';
                }
            });

            secenek.addEventListener('mouseleave', function() {
                const kayitliResim = tetikleyici.getAttribute('data-secili-resim');
                if (kayitliResim) {
                    kutuIciResim.src = kayitliResim;
                } else {
                    kutuIciResim.style.display = 'none';
                }
            });

            secenek.addEventListener('click', function() {
                const secilenBolge = this.getAttribute('data-value');
                const resimYolu = this.getAttribute('data-img');

                secilenMetin.textContent = secilenBolge;
                tetikleyici.setAttribute('data-secili-resim', resimYolu);
                kutuIciResim.src = resimYolu;
                kutuIciResim.style.display = 'block';
                
                seceneklerListesi.classList.remove('acik');

                hareketKutusu.disabled = false;
                hareketKutusu.style.backgroundColor = "rgba(0, 0, 0, 0.6)";
                hareketKutusu.style.cursor = "pointer";
                hareketKutusu.value = ""; 

                hareketSecenekleri.forEach(opt => {
                    if (opt.value === "") {
                        opt.text = secilenBolge + " egzersizlerinden birini seç...";
                        opt.style.display = 'block';
                    } else if (opt.getAttribute('data-bolge') === secilenBolge) {
                        opt.style.display = 'block';
                    } else {
                        opt.style.display = 'none';
                    }
                });
            });
        });

        document.getElementById('setAdeti').addEventListener('input', function() {
            const setSayisi = parseInt(this.value);
            const alan = document.getElementById('setDetaylariAlani');
            alan.innerHTML = ''; 

            if (setSayisi > 0 && setSayisi <= 10) {
                for (let i = 1; i <= setSayisi; i++) {
                    alan.innerHTML += `
                        <div style="background-color: rgba(229, 9, 20, 0.1); border: 1px solid #e50914; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left;">
                            <h4 style="margin: 0 0 10px 0; color: #e50914;">Set ${i}</h4>
                            <div style="display: flex; gap: 15px;">
                                <div style="flex: 1;">
                                    <label style="color: #ccc; font-size: 0.9rem;">Tekrar:</label>
                                    <input type="number" name="tekrar_${i}" min="1" required>
                                </div>
                                <div style="flex: 1;">
                                    <label style="color: #ccc; font-size: 0.9rem;">Ağırlık (KG):</label>
                                    <input type="number" step="0.5" name="agirlik_${i}" min="0" required>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
