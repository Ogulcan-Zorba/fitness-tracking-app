<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Seti Düzenle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0a0a0a; margin: 0; }
        .duzenle-kutu { background: rgba(15, 15, 15, 0.95); padding: 40px; border-radius: 12px; border-top: 5px solid #f39c12; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: left; }
        h2 { color: white; margin-top: 0; margin-bottom: 5px; }
        .alt-baslik { color: #f39c12; font-weight: bold; margin-bottom: 25px; display: block; font-size: 1.1rem; }
        label { color: #ccc; font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="number"], input[type="date"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #333; border-radius: 6px; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; font-family: 'Poppins', sans-serif; color-scheme: dark; }
        input[type="submit"] { background: #f39c12; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        input[type="submit"]:hover { background: #e67e22; }
        .iptal-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .iptal-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="duzenle-kutu">
        <h2>✏️ Seti Düzenle</h2>
        <span class="alt-baslik">{{ kayit[2] }} - {{ kayit[3] }}. Set</span>

        <form action="/antrenman_duzenle/{{ kayit[0] }}" method="POST">
            
            <label>Antrenman Tarihi:</label>
            <input type="date" name="tarih" value="{{ kayit[1] }}" required>

            <label>Tekrar Sayısı:</label>
            <input type="number" name="tekrar" value="{{ kayit[4] }}" min="1" required>

            <label>Ağırlık (KG):</label>
            <input type="number" step="0.5" name="agirlik" value="{{ kayit[5] }}" min="0" required>

            <input type="submit" value="DEĞİŞİKLİKLERİ KAYDET">
        </form>
        <a href="/gecmis" class="iptal-link">İptal Et ve Geri Dön</a>
    </div>

</body>
</html>
